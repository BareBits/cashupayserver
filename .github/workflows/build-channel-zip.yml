name: Build channel zip

# Builds the deployable standalone zip on every push to main or testing,
# then publishes it as the single asset on a moving-tag release
# (channel-main / channel-testing). The PHP auto-updater on deployed
# servers fetches the zip from that release.

on:
  push:
    branches:
      - main
      - testing

permissions:
  contents: write

concurrency:
  group: build-channel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Use HTTPS for SSH-form submodule URLs
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: curl, json, gmp, mbstring, sqlite3, zip
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build standalone zip
        env:
          COMMIT_SHA: ${{ github.sha }}
          CHANNEL: ${{ github.ref_name }}
        run: |
          ./scripts/build-standalone.sh

      - name: Compute release metadata
        id: meta
        run: |
          echo "tag=channel-${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Refresh moving-tag release
        # softprops/action-gh-release re-uploads assets to an existing release
        # but never moves the tag or refreshes the release's published date, so
        # the Releases page stays frozen at whenever the release was first cut.
        # Delete the release AND its tag first so the next step recreates both
        # at the current commit with a current timestamp. The window where the
        # asset is absent is a few seconds; the auto-updater is cron-driven and
        # retries, and the per-ref concurrency group prevents overlapping runs.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true

      - name: Publish moving-tag release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: "Channel: ${{ github.ref_name }} (${{ steps.meta.outputs.short_sha }})"
          body: |
            Auto-built from ${{ github.ref_name }}@${{ github.sha }}
            on ${{ steps.meta.outputs.built_at }}.

            This is a moving release. The deployed auto-updater pulls
            `cashupayserver.zip` from here. Do not link humans to it.
          prerelease: ${{ github.ref_name == 'testing' }}
          make_latest: "false"
          files: |
            build/cashupayserver.zip
            build/cashupayserver/BUILD_INFO
