# Apache vhost used by the production Docker image.
# - DocumentRoot is the operator's /var/www/html volume.
# - AllowOverride All so the in-repo .htaccess (rewrites, security headers,
#   path blocks) is honoured.
# - Logs go to Docker stdout/stderr via /proc/self/fd/{1,2}.

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
