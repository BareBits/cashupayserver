[pytest]
testpaths = e2e ui wordpress
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: tests that take significant time (LN channel ops, multi-mint failover)
    ui: Playwright browser-driven tests
    wordpress: tests that boot a WordPress instance
addopts = -ra --strict-markers --tb=short
log_cli = false
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_date_format = %H:%M:%S
